services:
  mysql:
    image: mysql:8.0
    container_name: chat-base-starter-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: userdb
      MYSQL_USER: user
      MYSQL_PASSWORD: user123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - chat-base-starter-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: chat-base-starter-postgres
    env_file:
      - ./docker/postgres/.env
    environment:
      POSTGRES_DB: ${POSTGRES_BOOTSTRAP_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_BOOTSTRAP_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_BOOTSTRAP_PASSWORD:-postgres123}
      DISCLOSURE_DB_NAME: ${DISCLOSURE_DB_NAME:-disclosuredb}
      DISCLOSURE_DB_USER: ${DISCLOSURE_DB_USER:-disclosure}
      DISCLOSURE_DB_PASSWORD: ${DISCLOSURE_DB_PASSWORD:-disclosure123}
      CHAT_DB_NAME: ${CHAT_DB_NAME:-chatdb}
      CHAT_DB_USER: ${CHAT_DB_USER:-chat}
      CHAT_DB_PASSWORD: ${CHAT_DB_PASSWORD:-chat123}
      AEGRA_DB_NAME: ${AEGRA_DB_NAME:-aegradb}
      AEGRA_DB_USER: ${AEGRA_DB_USER:-aegra}
      AEGRA_DB_PASSWORD: ${AEGRA_DB_PASSWORD:-aegra123}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - chat-base-starter-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U disclosure -d disclosuredb"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: chat-base-starter-user-service
    env_file:
      - ./user-service/.env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - chat-base-starter-network
    restart: unless-stopped

  disclosure-service:
    build:
      context: ./disclosure-service
      dockerfile: Dockerfile
    container_name: chat-base-starter-disclosure-service
    env_file:
      - ./disclosure-service/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chat-base-starter-network
    restart: unless-stopped

  chat-service:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    container_name: chat-base-starter-chat-service
    env_file:
      - ./chat-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      aegra-service:
        condition: service_started
    networks:
      - chat-base-starter-network
    restart: unless-stopped

  aegra-service:
    build:
      context: ./aegra-service
      dockerfile: Dockerfile
    container_name: chat-base-starter-aegra-service
    env_file:
      - ./aegra-service/.env
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chat-base-starter-network
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: chat-base-starter-api-gateway
    ports:
      - "8080:8080"
    env_file:
      - ./api-gateway/.env
    depends_on:
      - user-service
      - disclosure-service
      - chat-service
    networks:
      - chat-base-starter-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chat-base-starter-frontend
    ports:
      - "3003:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - api-gateway
    networks:
      - chat-base-starter-network
    restart: unless-stopped

networks:
  chat-base-starter-network:
    driver: bridge

volumes:
  mysql_data:
  postgres_data:
