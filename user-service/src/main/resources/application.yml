spring:
  application:
    name: user-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/userdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:user123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: always

server:
  port: 8081

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-me-jwt-secret-for-local-dev-only-2026-change-me-jwt-secret-for-local-dev-only-2026}
    expiration: 86400000  # 24 hours
  gateway:
    secret: ${APP_GATEWAY_SECRET:change-me-gateway-secret-for-local-dev-only-2026}
    trusted-ip: ${APP_GATEWAY_TRUSTED_IP:api-gateway}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 100ms, 200ms, 500ms, 1s, 2s
